query myAcademicWorkPage($relativePath: String!) {
  academicWorkPage(relativePath: $relativePath) {
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
      _values
    }
    ...MyAcademicWorkPageParts
  }
}

fragment MyAcademicWorkPageParts on AcademicWorkPage {
  __typename
  head {
    __typename
    title
    description
  }
  h1
}
