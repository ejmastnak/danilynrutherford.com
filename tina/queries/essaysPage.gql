query myEssaysPage($relativePath: String!) {
  essaysPage(relativePath: $relativePath) {
    ... on Document {
      _sys {
        filename
        basename
        hasReferences
        breadcrumbs
        path
        relativePath
        extension
      }
      id
      _values
    }
    ...MyEssaysPageParts
  }
}

fragment MyEssaysPageParts on EssaysPage {
  __typename
  head {
    __typename
    title
    description
  }
  h1
}
